- name: Apt | instala aplicaciones Gnome
  apt:
    name:
    - alacarte
    - aspell-es
    - bleachbit
    - calibre
    - cpupower-gui
    - dconf-editor
    - filezilla
    - gufw
    - fontforge
    - woff2
    - font-manager
    - gnome-shell-extensions
    - gnome-tweaks
    - gnome-disk-utility
    - gnome-system-monitor
    - gnome-shell-pomodoro
    - jmeter
    - ttf-mscorefonts-installer
    - typecatcher
    - visualvm
    - vokoscreen
    - obs-studio
    - shotcut
    state: present
  become: true

- name: Apt | desinstala aplicaciones Gnome
  apt:
    name: "{{ item }}"
    state: absent
    purge: yes
  loop: "{{ list_of_remove_apt }}"
  when: list_of_remove_apt is defined and list_of_remove_apt != None
  become: true
  tags:
  - escritorio
  - snap

- name: Apt | Install a .deb indicator_cpufreq from mantic repository
  ansible.builtin.apt:
    deb: http://mirrors.kernel.org/ubuntu/pool/universe/i/indicator-cpufreq/indicator-cpufreq_0.2.2-0ubuntu4_all.deb
  when: ansible_distribution_version == "22.04"
  become: true

- include_tasks: tasks/personalizacion_gnome.yml
  when: ansible_distribution == "Ubuntu"

- name: Apt | utilidades de compresión
  apt:
    name:
    - p7zip-rar
    - p7zip-full
    - unace
    - unrar
    - zip
    - unzip
    - mpack
    - arj
    - cabextract
    state: present
  become: true

- name: Apt | instala Open JDK 11
  apt:
    name:
    - openjdk-11-jdk
    - openjdk-21-jdk
    state: present
  ignore_errors: true
  become: true
  tags:
  - java

- name: Apt | Lector de epub, mobi
  apt:
    name:
    - fbreader
    state: present
  become: true

- name: Apt | instala aplicativos para el manejo de imágenes y video
  apt:
    name:
    - gthumb
    - webp
    - winff
    state: present
  become: true

- name: Apt | privacidad
  apt:
    name:
    - popularity-contest
    state: absent
    purge: yes
  when: ansible_distribution == "Ubuntu"
  become: true

- name: escritorio | instala aplicaciones con snap
  snap:
    name: "{{ item }}"
    classic: yes
  with_items:
  - "{{ list_of_snap_escritorio }}"
  become: true
  tags:
  - escritorio
  - snap

- name: escritorio | desinstala aplicaciones con snap
  snap:
    name: "{{ item }}"
    state: absent
  with_items:
  - "{{ list_of_remove_snap }}"
  become: true
  tags:
  - escritorio
  - snap
  when: list_of_remove_snap is defined

- name: escritorio | habilitar acceso a las aplicaciones con snap en /media
  raw: snap connect {{ item }}:removable-media
  with_items:
  - "{{ list_of_snap_access_media }}"
  when: list_of_snap_access_media is defined
  become: true
  tags:
  - escritorio
  - snap

- name: escritorio | habilitar acceso USB a las aplicaciones con snap
  raw: snap connect {{ item }}:raw-usb
  with_items:
  - "{{ list_of_snap_access_usb }}"
  when: list_of_snap_access_usb is defined
  become: true
  tags:
  - escritorio
  - snap

- name: escritorio | install speedtest and yt-dlp
  ansible.builtin.pip:
    name:
      - speedtest-cli
      - yt-dlp
    virtualenv: "{{ python_venv }}"
    virtualenv_command: python3 -m venv
  environment:
    PIP_BREAK_SYSTEM_PACKAGES: '1'
  become: true

- name: escritorio | Flameshot | Get PPA signing key fingerprint
  ansible.builtin.uri:
    url: "https://launchpad.net/api/1.0/~quentiumyt/+archive/ubuntu/flameshot"
    return_content: yes
  register: flameshot_ppa_info
  when: ansible_distribution == "Ubuntu"
  tags:
  - escritorio

- name: escritorio | Flameshot | Fetch PPA GPG key over HTTPS
  ansible.builtin.uri:
    url: "https://keyserver.ubuntu.com/pks/lookup?op=get&options=mr&exact=on&search=0x{{ flameshot_ppa_info.json.signing_key_fingerprint }}"
    return_content: yes
  register: flameshot_key_data
  when: ansible_distribution == "Ubuntu"
  until: flameshot_key_data is succeeded
  retries: 5
  delay: 10
  tags:
  - escritorio

- name: escritorio | Flameshot | Import PPA GPG key
  ansible.builtin.apt_key:
    data: "{{ flameshot_key_data.content }}"
  when: ansible_distribution == "Ubuntu"
  become: true
  tags:
  - escritorio

- name: escritorio | Flameshot | Add PPA repository
  ansible.builtin.apt_repository:
    repo: 'ppa:quentiumyt/flameshot'
    state: present
    update_cache: yes
  when: ansible_distribution == "Ubuntu"
  become: true
  register: flameshot_ppa
  until: flameshot_ppa is succeeded
  retries: 5
  delay: 10
  tags:
  - escritorio

- name: escritorio | Flameshot | Install
  ansible.builtin.apt:
    name: flameshot
    state: present
  when: ansible_distribution == "Ubuntu"
  become: true
  tags:
  - escritorio

- name: Apt | install Tor
  apt:
    name:
    - tor
    - torbrowser-launcher
    state: present
  become: true

- name: escritorio | Download Brave browser GPG key
  ansible.builtin.get_url:
    url: https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
    dest: /usr/share/keyrings/brave-browser-archive-keyring.gpg
    mode: '0644'
  register: brave_gpg_download
  until: brave_gpg_download is succeeded
  retries: 3
  delay: 10
  become: true
  tags:
  - escritorio

- name: escritorio | Add Brave browser repository to sources list
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/brave-browser-archive-keyring.gpg] https://brave-browser-apt-release.s3.brave.com/ stable main"
    state: present
    filename: brave-browser-release
  become: true
  tags:
  - escritorio

- name: escritorio | Update apt package list
  ansible.builtin.apt:
    update_cache: yes
  become: true
  tags:
  - escritorio

- name: escritorio | Install Brave browser
  ansible.builtin.apt:
    name: brave-browser
    state: present
  become: true
  tags:
  - escritorio
