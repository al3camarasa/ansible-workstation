---

- name: devops | ansible | actualizar requerimientos
  ansible.builtin.pip:
    name:
      - ansible-core=={{ ansible_version_target | default('2.15.12') }}
      - molecule
      - setuptools
      - wheel
      - pip
      - ansible-lint
      - ansible-cmdb
      - proxmoxer
      - requests
      - paramiko
    virtualenv: "{{ python_venv }}"
    virtualenv_command: python3 -m venv
    # virtualenv_python: "{{ python_version }}"
  environment:
    PIP_BREAK_SYSTEM_PACKAGES: '1'
  tags:
    - devops
    - ansible

- name: devops | ansible | requerimiento para creación de VM en Vsphere
  ansible.builtin.pip:
    name:
      - pyvmomi
    virtualenv: "{{ python_venv }}"
    virtualenv_command: python3 -m venv
  environment:
    PIP_BREAK_SYSTEM_PACKAGES: '1'
  tags:
    - devops
    - ansible

- name: devops | script that allow read access to YAML files through command line
  ansible.builtin.pip:
    name:
      - shyaml
    virtualenv: "{{ python_venv }}"
    virtualenv_command: python3 -m venv
  environment:
    PIP_BREAK_SYSTEM_PACKAGES: '1'
  tags:
    - devops
    - ansible

- name: devops | ansible | requerimiento para creación de streams en Graylog
  ansible.builtin.pip:
    name: jmespath
    virtualenv: "{{ python_venv }}"
    virtualenv_command: python3 -m venv
  environment:
    PIP_BREAK_SYSTEM_PACKAGES: '1'
  tags:
    - devops
    - ansible

    